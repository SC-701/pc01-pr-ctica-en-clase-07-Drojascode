name: Publicar paquetes NuGet de Autorización

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Seguridad/Seguridad.MiddlewareAutorizacion/**'
  workflow_dispatch:       # ← también se puede disparar manualmente

permissions:
  contents: read
  packages: write          # ★ permiso para escribir en GitHub Packages

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Restaurar dependencias
        run: |
          cd "Seguridad/Seguridad.MiddlewareAutorizacion"
          dotnet restore

      - name: Compilar en Release
        run: |
          cd "Seguridad/Seguridad.MiddlewareAutorizacion"
          dotnet build --configuration Release --no-restore

      - name: Empaquetar (dotnet pack)
        run: |
          cd "Seguridad/Seguridad.MiddlewareAutorizacion"
          dotnet pack --configuration Release --no-build --output ./nupkgs

      - name: Publicar en GitHub Packages
        run: |
          cd "Seguridad/Seguridad.MiddlewareAutorizacion"
          dotnet nuget push ./nupkgs/*.nupkg \
            --source "https://github.com/SC-701/pc01-pr-ctica-en-clase-07-Drojascode/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate